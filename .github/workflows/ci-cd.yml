name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...

  integration-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Create .env file from secrets
        run: |
          echo "SECRET_JWT_KEY=${{ secrets.SECRET_JWT_KEY }}" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
          echo "AUTORIA_KEY=${{ secrets.AUTORIA_KEY }}" >> .env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API on localhost:8082..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8082/swagger/index.html > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Attempt $i/30, retrying in 3s..."
            sleep 3
          done
          echo "API did not start in time"
          docker compose logs
          exit 1

      - name: Run integration tests
        run: go test ./tests/... -v -timeout 120s

      - name: Dump API logs on failure
        if: failure()
        run: docker compose logs api

      - name: Stop services
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/govehicleapi:latest
            ghcr.io/${{ env.OWNER }}/govehicleapi:${{ github.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/app

            cat > ~/app/.env << 'EOF'
            SECRET_JWT_KEY=${{ secrets.SECRET_JWT_KEY }}
            AUTORIA_KEY=${{ secrets.AUTORIA_KEY }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EOF

            cat > ~/app/docker-compose.yaml << 'EOF'
            services:
              mongo:
                image: mongo:latest
                container_name: mongo
                volumes:
                  - mongo_data:/data/db
                restart: unless-stopped

              redis:
                image: redis:latest
                container_name: redis
                command: redis-server --requirepass ${REDIS_PASSWORD}
                restart: unless-stopped

              api:
                image: ghcr.io/${{ env.OWNER }}/govehicleapi:latest
                container_name: go-vehicle-api
                ports:
                  - "8082:8082"
                env_file: .env
                environment:
                  - CONFIG_PATH=config/config.yaml
                depends_on:
                  - mongo
                  - redis
                volumes:
                  - sqlite_data:/app/storage
                restart: unless-stopped

            volumes:
              mongo_data:
              sqlite_data:
            EOF

            docker compose -f ~/app/docker-compose.yaml pull api
            docker compose -f ~/app/docker-compose.yaml up -d --force-recreate
            docker image prune -f
