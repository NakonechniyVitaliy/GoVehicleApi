services:
  mongo:
    image: mongo:latest
    container_name: mongo-local
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis-local
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: .
    container_name: go-vehicle-api
    ports:
      - "8082:8082"
    environment:
      - CONFIG_PATH=config/local.yaml
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

volumes:
  mongo_data: